<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin Login — {{ cafe.name }}</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Poppins', sans-serif;
      background: #0f0f1a;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }
    .bg-blobs {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
    }
    .blob {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.3;
      animation: floatBlob 8s ease-in-out infinite alternate;
    }
    .blob1 { width: 400px; height: 400px; background: #FF6B35; top: -100px; left: -100px; }
    .blob2 { width: 300px; height: 300px; background: #FFD700; bottom: -80px; right: -80px; animation-delay: 2s; }
    .blob3 { width: 200px; height: 200px; background: #7c3aed; top: 50%; left: 50%; animation-delay: 4s; }
    @keyframes floatBlob {
      from { transform: translate(0, 0) scale(1); }
      to   { transform: translate(30px, -30px) scale(1.1); }
    }

    .login-card {
      position: relative;
      z-index: 1;
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 24px;
      padding: 48px 40px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 32px 64px rgba(0,0,0,0.5);
    }
    .login-logo {
      text-align: center;
      margin-bottom: 32px;
    }
    .login-logo .logo-icon {
      font-size: 48px;
      display: block;
      margin-bottom: 8px;
    }
    .login-logo h1 {
      color: #FF6B35;
      font-size: 22px;
      font-weight: 700;
    }
    .login-logo p {
      color: rgba(255,255,255,0.5);
      font-size: 13px;
      margin-top: 4px;
    }
    .form-group {
      margin-bottom: 20px;
    }
    .form-group label {
      display: block;
      color: rgba(255,255,255,0.7);
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .input-wrapper {
      position: relative;
    }
    .input-wrapper i {
      position: absolute;
      left: 16px;
      top: 50%;
      transform: translateY(-50%);
      color: rgba(255,255,255,0.4);
      font-size: 14px;
    }
    .form-control {
      width: 100%;
      padding: 14px 16px 14px 44px;
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 12px;
      color: #fff;
      font-size: 15px;
      font-family: 'Poppins', sans-serif;
      transition: all 0.3s;
      outline: none;
    }
    .form-control:focus {
      border-color: #FF6B35;
      background: rgba(255,107,53,0.08);
      box-shadow: 0 0 0 3px rgba(255,107,53,0.15);
    }
    .form-control::placeholder { color: rgba(255,255,255,0.25); }

    .btn-login {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #FF6B35, #f7522a);
      border: none;
      border-radius: 12px;
      color: #fff;
      font-size: 16px;
      font-weight: 700;
      font-family: 'Poppins', sans-serif;
      cursor: pointer;
      margin-top: 8px;
      transition: all 0.3s;
      letter-spacing: 0.5px;
    }
    .btn-login:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(255,107,53,0.4);
    }
    .btn-login:active { transform: translateY(0); }

    .error-msg {
      background: rgba(239,68,68,0.15);
      border: 1px solid rgba(239,68,68,0.3);
      color: #f87171;
      padding: 12px 16px;
      border-radius: 10px;
      font-size: 13px;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .back-link {
      text-align: center;
      margin-top: 24px;
    }
    .back-link a {
      color: rgba(255,255,255,0.4);
      text-decoration: none;
      font-size: 13px;
      transition: color 0.2s;
    }
    .back-link a:hover { color: #FF6B35; }
  </style>
</head>
<body>
<div class="bg-blobs">
  <div class="blob blob1"></div>
  <div class="blob blob2"></div>
  <div class="blob blob3"></div>
</div>

<div class="login-card">
  <div class="login-logo">
    <span class="logo-icon">✨</span>
    <h1>{{ cafe.name }}</h1>
    <p>Owner Admin Dashboard</p>
  </div>

  {% if error %}
  <div class="error-msg">
    <i class="fas fa-exclamation-circle"></i> {{ error }}
  </div>
  {% endif %}

  <form method="POST" action="/admin/login">
    <div class="form-group">
      <label>Username</label>
      <div class="input-wrapper">
        <i class="fas fa-user"></i>
        <input type="text" name="username" class="form-control" placeholder="Enter username" required autocomplete="username"/>
      </div>
    </div>
    <div class="form-group">
      <label>Password</label>
      <div class="input-wrapper">
        <i class="fas fa-lock"></i>
        <input type="password" name="password" class="form-control" placeholder="Enter password" required autocomplete="current-password"/>
      </div>
    </div>
    <button type="submit" class="btn-login"><i class="fas fa-sign-in-alt"></i> &nbsp;Sign In to Dashboard</button>
  </form>

  <div class="back-link">
    <a href="/"><i class="fas fa-arrow-left"></i> Back to Cafe Website</a>
  </div>
</div>
</body>
</html>
